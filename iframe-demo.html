<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replicate API Interface - iFrame Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .iframe-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: calc(100vh - 100px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .info {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .info h2 {
            color: #667eea;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .info p {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        code {
            background: #f7fafc;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #e53e3e;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .iframe-wrapper {
                height: calc(100vh - 80px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Replicate API Interface - iFrame Embed Demo</h1>

        <div class="info">
            <h2>Embedding Instructions</h2>
            <p>This page demonstrates how to embed the Replicate API Interface in an iframe.</p>
            <p><strong>Basic embed code:</strong></p>
            <p><code>&lt;iframe src="YOUR_APP_URL" width="100%" height="600" frameborder="0" allow="camera; microphone; fullscreen"&gt;&lt;/iframe&gt;</code></p>
        </div>

        <div class="controls">
            <button onclick="document.getElementById('app-iframe').requestFullscreen()">Fullscreen</button>
            <button onclick="location.reload()">Reload</button>
        </div>

        <div class="iframe-wrapper">
            <iframe
                id="app-iframe"
                src="/"
                allow="camera; microphone; fullscreen; clipboard-read; clipboard-write"
                sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads"
                loading="eager">
            </iframe>
        </div>
    </div>
</body>
</html>
